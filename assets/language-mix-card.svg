<svg width="720" height="210" viewBox="0 0 720 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Most Used Languages</title>
  <desc id="desc">Segmented bar chart showing public repository language mix: JS/TS 52.2%, CSS 21.6%, Swift 15.4%, HTML 4.2%, Objective-C 2.7%, SCSS 1.7%, Other 2.2%.</desc>
  <rect x="10" y="10" width="700" height="190" rx="18" fill="#FFFFFF"/>
  <rect x="10.75" y="10.75" width="698.5" height="188.5" rx="17.25" stroke="#E5E7EB" stroke-width="1.5"/>

  <text x="34" y="52" fill="#4F46E5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="700">
    Most Used Languages
  </text>

  <g transform="translate(34 78)">
    <rect width="650" height="16" rx="8" fill="#F3F4F6"/>
    <clipPath id="bar-clip">
      <rect width="650" height="16" rx="8"/>
    </clipPath>
    <g clip-path="url(#bar-clip)">
      <rect x="0" y="0" width="339.3" height="16" fill="#F1E05A"/>
      <rect x="339.3" y="0" width="140.4" height="16" fill="#563D7C"/>
      <rect x="479.7" y="0" width="100.1" height="16" fill="#F05138"/>
      <rect x="579.8" y="0" width="27.3" height="16" fill="#E34C26"/>
      <rect x="607.1" y="0" width="17.6" height="16" fill="#438EFF"/>
      <rect x="624.7" y="0" width="11.1" height="16" fill="#C6538C"/>
      <rect x="635.8" y="0" width="14.2" height="16" fill="#6B7280"/>
    </g>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#4B5563">
    <circle cx="42" cy="130" r="7" fill="#F1E05A"/>
    <text x="58" y="136" font-weight="600">JS/TS 52.2%</text>

    <circle cx="262" cy="130" r="7" fill="#563D7C"/>
    <text x="278" y="136" font-weight="600">CSS 21.6%</text>

    <circle cx="452" cy="130" r="7" fill="#F05138"/>
    <text x="468" y="136" font-weight="600">Swift 15.4%</text>

    <circle cx="42" cy="165" r="7" fill="#E34C26"/>
    <text x="58" y="171" font-weight="600">HTML 4.2%</text>

    <circle cx="262" cy="165" r="7" fill="#438EFF"/>
    <text x="278" y="171" font-weight="600">Objective-C 2.7%</text>

    <circle cx="452" cy="165" r="7" fill="#C6538C"/>
    <text x="468" y="171" font-weight="600">SCSS 1.7%</text>

    <circle cx="625" cy="165" r="7" fill="#6B7280"/>
    <text x="641" y="171" text-anchor="end" font-weight="600">Other 2.2%</text>
  </g>
</svg>
